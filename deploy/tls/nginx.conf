events {}

http {
    # Formato de log para mejor debugging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_request_id"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log debug;

    # Upstreams para los servicios
    upstream auth_service {
        server auth:8081;
    }

    upstream tasks_service {
        server tasks:8082;
    }

    server {
        listen 8443 ssl;
        server_name localhost;

        # Certificados
        ssl_certificate /etc/nginx/tls/cert.pem;
        ssl_certificate_key /etc/nginx/tls/key.pem;

        # Configuración SSL recomendada
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # ===== RUTAS PARA AUTH =====
        location /v1/auth/ {
            proxy_pass http://auth_service;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health/auth {
            proxy_pass http://auth_service/health;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # ===== RUTAS PARA TASKS (VERSIÓN SIMPLE Y CORRECTA) =====
        # Para /v1/tasks (sin slash) - LISTAR y CREAR
        location /v1/tasks {
            # Si termina exactamente en /v1/tasks, lo dejamos pasar
            proxy_pass http://tasks_service;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header Authorization $http_authorization;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Para subrutas como /v1/tasks/search, /v1/tasks/search/vulnerable
        location /v1/tasks/ {
            proxy_pass http://tasks_service/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header Authorization $http_authorization;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check para tasks
        location /health/tasks {
            proxy_pass http://tasks_service/health;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # Health check general
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Ruta por defecto
        location / {
            return 404 "Not Found\n";
            add_header Content-Type text/plain;
        }
    }
}